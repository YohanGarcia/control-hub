services:
  postgres:
    image: postgres:16-alpine
    container_name: controlhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-controlhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-controlhub-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-controlhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-controlhub} -d ${POSTGRES_DB:-controlhub}"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: controlhub-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: controlhub-api
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-controlhub}:${POSTGRES_PASSWORD:-controlhub-change-me}@postgres:5432/${POSTGRES_DB:-controlhub}
      REDIS_URL: redis://redis:6379/0
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: controlhub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ../app_flutter/build/web:/usr/share/nginx/html:ro

volumes:
  postgres_data:
  redis_data:
