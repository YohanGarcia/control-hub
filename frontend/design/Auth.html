<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Control Center · Acceso</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #0a0e1a;
    --bg-2: #0f1424;
    --bg-3: #131a2e;
    --line: #1f2940;
    --line-strong: #2a3654;
    --text: #e6ebf5;
    --text-2: #aab3c8;
    --text-3: #6b7591;
    --text-4: #4a5475;
    --blue: #3b82f6;
    --blue-2: #60a5fa;
    --violet: #8b5cf6;
    --violet-2: #a78bfa;
    --green: #22c55e;
    --green-2: #4ade80;
    --amber: #f59e0b;
    --red: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg-1); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
  body {
    position: relative; overflow-x: hidden;
    background:
      radial-gradient(900px 700px at 12% 8%, rgba(59,130,246,0.14), transparent 55%),
      radial-gradient(900px 700px at 88% 95%, rgba(139,92,246,0.14), transparent 55%),
      var(--bg-1);
  }
  ::selection { background: rgba(59,130,246,0.35); color: #fff; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
  button, input, select { font-family: inherit; }
  a { color: inherit; text-decoration: none; }

  @keyframes pulse-dot { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.55); } 50% { box-shadow: 0 0 0 5px rgba(34,197,94,0); } }
  .pulse { animation: pulse-dot 2s infinite; }

  @keyframes float-orb-a { 0%,100% { transform: translate(0,0); } 50% { transform: translate(40px,-30px); } }
  @keyframes float-orb-b { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-30px,40px); } }
  @keyframes typing { 0%,100% { opacity: 1 } 50% { opacity: 0 } }
  .blink { animation: typing 1s steps(2,end) infinite; }
  @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .fade-in { animation: fade-in 280ms ease-out both; }

  /* grid backdrop */
  .grid-bg {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 56px 56px, 56px 56px;
    mask-image: radial-gradient(60% 50% at 30% 30%, #000 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(60% 50% at 30% 30%, #000 30%, transparent 80%);
  }

  .scroll::-webkit-scrollbar { width: 8px; }
  .scroll::-webkit-scrollbar-thumb { background: #1c2542; border-radius: 8px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;

/* =========================================================
   ICONS
   ========================================================= */
const Icon = ({ name, size = 16, stroke = 1.6, style, className }) => {
  const s = { width: size, height: size, ...(style||{}) };
  const c = { fill: 'none', stroke: 'currentColor', strokeWidth: stroke, strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (name) {
    case 'logo': return (
      <svg viewBox="0 0 24 24" style={s}>
        <defs>
          <linearGradient id="al-lg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stopColor="#60a5fa"/><stop offset="1" stopColor="#8b5cf6"/>
          </linearGradient>
        </defs>
        <path d="M4 7 L12 3 L20 7 L20 17 L12 21 L4 17 Z" fill="url(#al-lg)" opacity="0.18" stroke="url(#al-lg)" strokeWidth="1.6"/>
        <path d="M4 7 L12 11 L20 7" stroke="url(#al-lg)" strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M12 11 L12 21" stroke="url(#al-lg)" strokeWidth="1.6" strokeLinecap="round"/>
      </svg>
    );
    case 'mail':   return <svg viewBox="0 0 24 24" style={s}><rect {...c} x="3" y="5" width="18" height="14" rx="2"/><path {...c} d="M3 7l9 6 9-6"/></svg>;
    case 'lock':   return <svg viewBox="0 0 24 24" style={s}><rect {...c} x="4" y="11" width="16" height="9" rx="2"/><path {...c} d="M8 11V7a4 4 0 018 0v4"/></svg>;
    case 'user':   return <svg viewBox="0 0 24 24" style={s}><circle {...c} cx="12" cy="8" r="4"/><path {...c} d="M4 21a8 8 0 0116 0"/></svg>;
    case 'building': return <svg viewBox="0 0 24 24" style={s}><rect {...c} x="4" y="4" width="16" height="17" rx="1.5"/><path {...c} d="M9 8h.01M15 8h.01M9 12h.01M15 12h.01M9 16h.01M15 16h.01M10 21v-3h4v3"/></svg>;
    case 'eye':    return <svg viewBox="0 0 24 24" style={s}><path {...c} d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle {...c} cx="12" cy="12" r="3"/></svg>;
    case 'eye-off':return <svg viewBox="0 0 24 24" style={s}><path {...c} d="M3 3l18 18"/><path {...c} d="M10.6 6.1A10 10 0 0112 6c6.5 0 10 6 10 6a18 18 0 01-3.2 3.9M6.6 6.6A18 18 0 002 12s3.5 6 10 6a10 10 0 003.4-.6"/><path {...c} d="M14.1 14.1A3 3 0 019.9 9.9"/></svg>;
    case 'check':  return <svg viewBox="0 0 24 24" style={s}><path {...c} d="M5 12l4 4 10-10"/></svg>;
    case 'arrow':  return <svg viewBox="0 0 24 24" style={s}><path {...c} d="M5 12h14M13 6l6 6-6 6"/></svg>;
    case 'shield': return <svg viewBox="0 0 24 24" style={s}><path {...c} d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3z"/></svg>;
    case 'terminal':return <svg viewBox="0 0 24 24" style={s}><path {...c} d="M4 6h16v12H4z"/><path {...c} d="M7 10l3 2-3 2"/><path {...c} d="M13 14h4"/></svg>;
    case 'globe':  return <svg viewBox="0 0 24 24" style={s}><circle {...c} cx="12" cy="12" r="9"/><path {...c} d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>;
    case 'google': return (<svg viewBox="0 0 24 24" style={s}>
      <path d="M21.35 11.1H12v2.94h5.35c-.23 1.38-1.7 4.04-5.35 4.04a5.96 5.96 0 010-11.92c1.86 0 3.11.79 3.82 1.47l2.6-2.5C16.86 3.7 14.7 2.7 12 2.7a9.3 9.3 0 100 18.6c5.36 0 8.93-3.76 8.93-9.06 0-.6-.07-1.06-.16-1.5z" fill="#fff"/>
    </svg>);
    case 'github': return (<svg viewBox="0 0 24 24" style={s}>
      <path fill="#fff" d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.1.79-.25.79-.55v-2c-3.2.7-3.87-1.37-3.87-1.37-.52-1.33-1.27-1.68-1.27-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.67 1.24 3.32.95.1-.74.4-1.24.72-1.53-2.55-.29-5.23-1.28-5.23-5.7 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.18a10.86 10.86 0 015.74 0c2.19-1.49 3.15-1.18 3.15-1.18.62 1.58.23 2.75.11 3.04.74.81 1.18 1.84 1.18 3.1 0 4.43-2.69 5.4-5.25 5.69.41.36.78 1.06.78 2.14v3.17c0 .3.21.66.8.55C20.21 21.39 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"/>
    </svg>);
    case 'eye':    return <svg viewBox="0 0 24 24" style={s}><path {...c} d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle {...c} cx="12" cy="12" r="3"/></svg>;
    case 'cube':   return <svg viewBox="0 0 24 24" style={s}><path {...c} d="M12 3l8 4.5v9L12 21l-8-4.5v-9z"/><path {...c} d="M4 7.5L12 12l8-4.5M12 12v9"/></svg>;
    case 'spark':  return <svg viewBox="0 0 24 24" style={s}><path {...c} d="M12 2l1.8 5.6L19 9.4l-4.2 3 1.5 5.6L12 14.8 7.7 18l1.5-5.6L5 9.4l5.2-1.8L12 2z"/></svg>;
    default: return null;
  }
};

/* =========================================================
   LEFT BRAND PANEL
   ========================================================= */
function BrandPanel() {
  return (
    <div style={{
      flex: 1.1, position: 'relative', overflow: 'hidden',
      borderRight: '1px solid var(--line)',
      display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
      padding: '40px 48px',
      background: 'linear-gradient(180deg, rgba(10,14,26,0.4), rgba(10,14,26,0.85))',
    }}>
      {/* animated orbs */}
      <div style={{ position: 'absolute', top: -60, left: -40, width: 360, height: 360, borderRadius: '50%', background: 'radial-gradient(circle, rgba(59,130,246,0.32), transparent 70%)', filter: 'blur(40px)', animation: 'float-orb-a 10s ease-in-out infinite', pointerEvents:'none' }}/>
      <div style={{ position: 'absolute', bottom: -80, right: -60, width: 420, height: 420, borderRadius: '50%', background: 'radial-gradient(circle, rgba(139,92,246,0.28), transparent 70%)', filter: 'blur(50px)', animation: 'float-orb-b 12s ease-in-out infinite', pointerEvents:'none' }}/>
      <div className="grid-bg"/>

      {/* logo */}
      <div style={{ position: 'relative', display:'flex', alignItems:'center', gap: 12 }}>
        <Icon name="logo" size={38}/>
        <div>
          <div style={{ fontSize: 18, fontWeight: 700, color:'#fff', letterSpacing: -0.2 }}>Control Center</div>
          <div className="mono" style={{ fontSize: 11, color: 'var(--text-3)' }}>v2.4.1 · enterprise</div>
        </div>
      </div>

      {/* tagline */}
      <div style={{ position: 'relative', maxWidth: 480 }}>
        <h1 style={{
          fontSize: 42, fontWeight: 700, color: '#fff',
          margin: 0, lineHeight: 1.1, letterSpacing: -1,
        }}>
          Una sola consola para toda tu <span style={{ background: 'linear-gradient(90deg, var(--blue-2), var(--violet-2))', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>infraestructura</span>.
        </h1>
        <p style={{ marginTop: 20, fontSize: 15, color: 'var(--text-2)', lineHeight: 1.55, maxWidth: 440 }}>
          Monitorea servidores, ejecuta comandos remotos y orquesta despliegues — todo desde una interfaz pensada para equipos DevOps modernos.
        </p>

        {/* live status pills */}
        <div style={{ display:'flex', gap: 8, marginTop: 24, flexWrap: 'wrap' }}>
          <Pill icon="globe">162 servidores conectados</Pill>
          <Pill icon="check" color="var(--green-2)" bg="rgba(34,197,94,0.10)" border="rgba(34,197,94,0.3)">99.98% uptime</Pill>
          <Pill icon="shield" color="var(--violet-2)" bg="rgba(139,92,246,0.10)" border="rgba(139,92,246,0.3)">SOC 2 · ISO 27001</Pill>
        </div>

        {/* fake terminal preview */}
        <FakeTerminal/>
      </div>

      {/* footer */}
      <div style={{ position: 'relative', display:'flex', alignItems:'center', justifyContent:'space-between', fontSize: 12, color: 'var(--text-3)' }}>
        <span>© 2026 Control Center, Inc.</span>
        <div style={{ display:'flex', gap: 18 }}>
          <a href="#" style={{ color:'var(--text-3)' }} onMouseEnter={(e)=>e.currentTarget.style.color='var(--text)'} onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-3)'}>Estado</a>
          <a href="#" style={{ color:'var(--text-3)' }} onMouseEnter={(e)=>e.currentTarget.style.color='var(--text)'} onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-3)'}>Documentación</a>
          <a href="#" style={{ color:'var(--text-3)' }} onMouseEnter={(e)=>e.currentTarget.style.color='var(--text)'} onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-3)'}>Privacidad</a>
        </div>
      </div>
    </div>
  );
}
function Pill({ icon, children, color = 'var(--text-2)', bg = 'rgba(255,255,255,0.04)', border = 'var(--line)' }) {
  return <span style={{
    display: 'inline-flex', alignItems: 'center', gap: 7,
    padding: '6px 11px', borderRadius: 999,
    background: bg, border: `1px solid ${border}`, color,
    fontSize: 12, fontWeight: 500,
  }}>
    {icon && <Icon name={icon} size={13}/>}{children}
  </span>;
}
function FakeTerminal() {
  const lines = [
    { p: 'admin@control:~$ ', c: 'ssh deploy@prod-api' },
    { o: '● conexión segura establecida · ED25519', cls: 'g' },
    { p: 'deploy@prod-api:~$ ', c: 'kubectl rollout status web' },
    { o: 'deployment "web" successfully rolled out', cls: 'g' },
    { p: 'deploy@prod-api:~$ ', c: '' },
  ];
  return (
    <div className="mono" style={{
      marginTop: 32,
      borderRadius: 12,
      background: 'rgba(7,10,20,0.7)',
      border: '1px solid var(--line)',
      boxShadow: '0 12px 36px rgba(0,0,0,0.4), 0 0 28px rgba(59,130,246,0.08)',
      backdropFilter: 'blur(8px)',
      overflow: 'hidden',
      fontSize: 12.5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        padding: '8px 12px',
        borderBottom: '1px solid var(--line)',
        background: 'rgba(15,20,36,0.7)',
      }}>
        <span style={{width:10, height:10, borderRadius:'50%', background:'#ef4444'}}/>
        <span style={{width:10, height:10, borderRadius:'50%', background:'#f59e0b'}}/>
        <span style={{width:10, height:10, borderRadius:'50%', background:'#22c55e'}}/>
        <span style={{ marginLeft: 8, fontSize: 11.5, color:'var(--text-3)' }}>deploy@prod-api · zsh</span>
      </div>
      <div style={{ padding: '12px 14px', lineHeight: 1.55 }}>
        {lines.map((l, i) => l.p !== undefined ? (
          <div key={i}>
            <span style={{ color: 'var(--green-2)' }}>{l.p}</span>
            <span style={{ color: '#fff' }}>{l.c}</span>
            {i === lines.length - 1 && <span className="blink" style={{ display:'inline-block', width: 7, height: 14, background:'var(--green)', verticalAlign: -2, marginLeft: 2, borderRadius: 1 }}/>}
          </div>
        ) : (
          <div key={i} style={{ color: l.cls === 'g' ? 'var(--green-2)' : 'var(--text-2)' }}>{l.o}</div>
        ))}
      </div>
    </div>
  );
}

/* =========================================================
   FORM CONTROLS
   ========================================================= */
function Field({ label, icon, children, hint, right }) {
  return (
    <label style={{ display: 'block', marginBottom: 14 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: 6 }}>
        <span style={{ fontSize: 12.5, color: 'var(--text-2)', fontWeight: 500 }}>{label}</span>
        {right}
      </div>
      <div style={{ position: 'relative' }}>
        {icon && <span style={{ position:'absolute', left: 12, top:'50%', transform:'translateY(-50%)', color: 'var(--text-3)', display:'inline-flex', pointerEvents: 'none' }}><Icon name={icon} size={15}/></span>}
        {children}
      </div>
      {hint && <div style={{ fontSize: 11.5, color: 'var(--text-3)', marginTop: 5 }}>{hint}</div>}
    </label>
  );
}
function TextInput({ value, onChange, type='text', placeholder, icon, rightAdornment, autoFocus }) {
  return (
    <div style={{ position: 'relative' }}>
      <input
        value={value} onChange={(e)=>onChange(e.target.value)} type={type}
        placeholder={placeholder} autoFocus={autoFocus} spellCheck="false"
        style={{
          width: '100%', padding: icon ? '11px 12px 11px 38px' : '11px 12px', paddingRight: rightAdornment ? 44 : 12,
          background: 'rgba(255,255,255,0.025)',
          border: '1px solid var(--line)',
          borderRadius: 10,
          color: '#fff', fontSize: 13.5, outline: 'none',
          transition: 'border-color 160ms, box-shadow 160ms, background 160ms',
        }}
        onFocus={(e)=>{ e.currentTarget.style.borderColor='rgba(59,130,246,0.55)'; e.currentTarget.style.boxShadow='0 0 0 3px rgba(59,130,246,0.18), 0 0 22px rgba(59,130,246,0.10)'; e.currentTarget.style.background='rgba(59,130,246,0.04)'; }}
        onBlur={(e)=>{ e.currentTarget.style.borderColor='var(--line)'; e.currentTarget.style.boxShadow='none'; e.currentTarget.style.background='rgba(255,255,255,0.025)'; }}
      />
      {rightAdornment && <span style={{ position:'absolute', right: 8, top: '50%', transform: 'translateY(-50%)' }}>{rightAdornment}</span>}
    </div>
  );
}
function PasswordInput({ value, onChange, placeholder, autoFocus }) {
  const [show, setShow] = useState(false);
  return (
    <TextInput
      value={value} onChange={onChange} type={show ? 'text' : 'password'} placeholder={placeholder} icon="lock" autoFocus={autoFocus}
      rightAdornment={
        <button type="button" onClick={() => setShow(s => !s)} title={show ? 'Ocultar' : 'Mostrar'} style={{
          width: 30, height: 30, borderRadius: 7, border: 0, background: 'transparent',
          color: 'var(--text-3)', cursor: 'pointer', display:'grid', placeItems:'center',
        }} onMouseEnter={(e)=>e.currentTarget.style.color='var(--text)'} onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-3)'}>
          <Icon name={show ? 'eye-off' : 'eye'} size={15}/>
        </button>
      }
    />
  );
}
function Checkbox({ value, onChange, children }) {
  return (
    <label style={{ display:'inline-flex', alignItems:'flex-start', gap: 10, cursor: 'pointer', userSelect:'none' }}>
      <span onClick={() => onChange(!value)} style={{
        width: 18, height: 18, borderRadius: 5,
        border: '1px solid ' + (value ? 'rgba(59,130,246,0.6)' : 'var(--line-strong)'),
        background: value ? 'linear-gradient(180deg, #3b82f6, #2f6ed1)' : 'rgba(255,255,255,0.02)',
        display:'grid', placeItems: 'center',
        boxShadow: value ? '0 0 10px rgba(59,130,246,0.35), inset 0 1px 0 rgba(255,255,255,0.18)' : 'none',
        transition: 'all 160ms',
        marginTop: 1,
      }}>
        {value && <Icon name="check" size={11} style={{color:'#fff', strokeWidth: 3}}/>}
      </span>
      <span style={{ fontSize: 12.5, color: 'var(--text-2)', lineHeight: 1.45 }}>{children}</span>
    </label>
  );
}
function PrimaryBtn({ children, onClick, loading, disabled }) {
  return (
    <button type="submit" onClick={onClick} disabled={disabled || loading} style={{
      width: '100%', padding: '12px 16px', borderRadius: 10,
      background: disabled
        ? 'rgba(255,255,255,0.06)'
        : 'linear-gradient(180deg, #3b82f6, #2f6ed1)',
      color: disabled ? 'var(--text-3)' : '#fff', border: 0,
      fontSize: 14, fontWeight: 600, cursor: disabled ? 'not-allowed' : 'pointer',
      boxShadow: disabled ? 'none' : '0 8px 22px rgba(59,130,246,0.35), inset 0 1px 0 rgba(255,255,255,0.18)',
      display:'inline-flex', alignItems:'center', justifyContent:'center', gap: 8,
      transition: 'transform 120ms ease',
    }}
      onMouseDown={(e)=>{ if (!disabled) e.currentTarget.style.transform='scale(0.98)'; }}
      onMouseUp={(e)=>{ e.currentTarget.style.transform='scale(1)'; }}
      onMouseLeave={(e)=>{ e.currentTarget.style.transform='scale(1)'; }}
    >
      {loading ? <Spinner/> : <>{children} <Icon name="arrow" size={15}/></>}
    </button>
  );
}
function Spinner() {
  return <svg width="18" height="18" viewBox="0 0 24 24" style={{animation:'spin 900ms linear infinite'}}>
    <style>{`@keyframes spin { to { transform: rotate(360deg) } }`}</style>
    <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.25)" strokeWidth="3" fill="none"/>
    <path d="M21 12a9 9 0 00-9-9" stroke="#fff" strokeWidth="3" strokeLinecap="round" fill="none"/>
  </svg>;
}
function SSOBtn({ provider, label }) {
  return (
    <button type="button" style={{
      flex: 1, padding: '10px 12px', borderRadius: 10,
      background: 'rgba(255,255,255,0.025)', border: '1px solid var(--line)',
      color: '#fff', cursor: 'pointer',
      display:'inline-flex', alignItems:'center', justifyContent:'center', gap: 10,
      fontSize: 13, fontWeight: 500,
      transition: 'background 160ms, border-color 160ms',
    }}
      onMouseEnter={(e)=>{ e.currentTarget.style.background='rgba(255,255,255,0.05)'; e.currentTarget.style.borderColor='var(--line-strong)'; }}
      onMouseLeave={(e)=>{ e.currentTarget.style.background='rgba(255,255,255,0.025)'; e.currentTarget.style.borderColor='var(--line)'; }}
    >
      <Icon name={provider} size={16}/> {label}
    </button>
  );
}
function Divider({ children }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap: 12, margin: '20px 0' }}>
      <div style={{ flex: 1, height: 1, background: 'var(--line)' }}/>
      <span style={{ fontSize: 11, color: 'var(--text-3)', letterSpacing: 1.1, textTransform: 'uppercase' }}>{children}</span>
      <div style={{ flex: 1, height: 1, background: 'var(--line)' }}/>
    </div>
  );
}

/* =========================================================
   PASSWORD STRENGTH
   ========================================================= */
function scorePassword(pw) {
  let s = 0;
  if (pw.length >= 8) s++;
  if (pw.length >= 12) s++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
  if (/\d/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  return Math.min(s, 4);
}
function StrengthMeter({ pw }) {
  const score = scorePassword(pw);
  const labels = ['Muy débil', 'Débil', 'Aceptable', 'Fuerte', 'Excelente'];
  const colors = ['var(--red)', 'var(--amber)', 'var(--amber)', 'var(--green-2)', 'var(--green-2)'];
  return (
    <div style={{ marginTop: 8 }}>
      <div style={{ display:'flex', gap: 4 }}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{ flex: 1, height: 4, borderRadius: 3, background: i < score ? colors[score] : 'rgba(255,255,255,0.05)', transition: 'background 160ms' }}/>
        ))}
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', marginTop: 6 }}>
        <span style={{ fontSize: 11, color: 'var(--text-3)' }}>Mínimo 8 caracteres con número y mayúscula</span>
        <span style={{ fontSize: 11, color: pw ? colors[score] : 'var(--text-3)' }}>{pw ? labels[score] : ''}</span>
      </div>
    </div>
  );
}

/* =========================================================
   LOGIN VIEW
   ========================================================= */

      <div style={{ display:'flex', gap: 10, marginBottom: 18 }}>

/* =========================================================
   REGISTER VIEW
   ========================================================= */
function RegisterView({ onSwitch }) {
  const [name, setName] = useState('');
  const [org, setOrg] = useState('');
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [terms, setTerms] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const canSubmit = name && email && pw && terms && scorePassword(pw) >= 2;

  const submit = (e) => {
    e?.preventDefault();
    setError('');
    if (!canSubmit) { setError('Completa los campos y acepta los términos.'); return; }
    setLoading(true);
    setTimeout(() => { setLoading(false); window.location.href = 'Terminal.html'; }, 900);
  };

  return (
    <form className="fade-in" onSubmit={submit} style={{ width: '100%' }}>
      <h2 style={{ margin: 0, fontSize: 26, fontWeight: 700, color:'#fff', letterSpacing: -0.4 }}>Crea tu cuenta</h2>
      <p style={{ marginTop: 6, marginBottom: 22, fontSize: 14, color: 'var(--text-3)' }}>14 días gratis · sin tarjeta · cancela cuando quieras.</p>

      <div style={{ display:'flex', gap: 10, marginBottom: 18 }}>
        <SSOBtn provider="google" label="Continuar con Google"/>
        <SSOBtn provider="github" label="Continuar con GitHub"/>
      </div>
      <Divider>o con tu correo</Divider>

      <div style={{ display:'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        <Field label="Nombre completo">
          <TextInput value={name} onChange={setName} placeholder="Ada Lovelace" icon="user" autoFocus/>
        </Field>
        <Field label="Organización" hint="Opcional · puedes invitar a tu equipo después">
          <TextInput value={org} onChange={setOrg} placeholder="Acme Inc." icon="building"/>
        </Field>
      </div>

      <Field label="Correo de trabajo">
        <TextInput value={email} onChange={setEmail} type="email" placeholder="tu@empresa.com" icon="mail"/>
      </Field>

      <Field label="Contraseña">
        <PasswordInput value={pw} onChange={setPw} placeholder="Crea una contraseña fuerte"/>
      </Field>
      <StrengthMeter pw={pw}/>

      <div style={{ margin: '20px 0' }}>
        <Checkbox value={terms} onChange={setTerms}>
          Acepto los <a href="#" style={{ color:'var(--blue-2)' }}>términos del servicio</a> y la <a href="#" style={{ color:'var(--blue-2)' }}>política de privacidad</a>.
        </Checkbox>
      </div>

      {error && <ErrorBanner>{error}</ErrorBanner>}

      <PrimaryBtn loading={loading} disabled={!canSubmit}>Crear cuenta</PrimaryBtn>

      <p style={{ marginTop: 22, fontSize: 13, color: 'var(--text-3)', textAlign: 'center' }}>
        ¿Ya tienes cuenta? <a href="#" onClick={(e)=>{e.preventDefault(); onSwitch();}} style={{ color: 'var(--blue-2)', fontWeight: 500 }}>Inicia sesión</a>
      </p>
    </form>
  );
}

function ErrorBanner({ children }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10,
      padding: '10px 12px', marginBottom: 14, borderRadius: 9,
      background: 'rgba(239,68,68,0.10)',
      border: '1px solid rgba(239,68,68,0.3)',
      color: '#fca5a5', fontSize: 12.5,
    }}>
      <Icon name="shield" size={14}/> {children}
    </div>
  );
}

/* =========================================================
   APP
   ========================================================= */
function App() {
  const [mode, setMode] = useState(() => (window.location.hash === '#register' ? 'register' : 'login'));
  useEffect(() => {
    window.location.hash = mode === 'register' ? '#register' : '#login';
  }, [mode]);

  return (
    <div style={{ display: 'flex', minHeight: '100vh' }}>
      <BrandPanel/>

      {/* form pane */}
      <div style={{
        flex: 1, display: 'flex', flexDirection: 'column',
        position: 'relative',
      }}>
        {/* top right back link */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding: '24px 40px' }}>
          <div style={{ display:'inline-flex', alignItems:'center', gap: 8, fontSize: 12, color:'var(--text-3)' }}>
            <span style={{ display:'inline-block', width: 8, height: 8, borderRadius:'50%', background:'var(--green)', boxShadow:'0 0 8px var(--green)' }} className="pulse"/>
            Todos los sistemas operativos
          </div>
          <div style={{ display:'inline-flex', alignItems:'center', padding: 3, gap: 0, background: 'rgba(255,255,255,0.025)', border: '1px solid var(--line)', borderRadius: 10 }}>
            <TabBtn active={mode==='login'} onClick={()=>setMode('login')}>Iniciar sesión</TabBtn>
            <TabBtn active={mode==='register'} onClick={()=>setMode('register')}>Crear cuenta</TabBtn>
          </div>
        </div>

        {/* form card */}
        <div style={{ flex: 1, display:'flex', alignItems:'center', justifyContent:'center', padding: '0 40px 40px' }}>
          <div style={{ width: '100%', maxWidth: 440 }}>
            {mode === 'login' ? <LoginView onSwitch={()=>setMode('register')}/> : <RegisterView onSwitch={()=>setMode('login')}/>}
          </div>
        </div>

        {/* footer */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding: '20px 40px', fontSize: 12, color: 'var(--text-4)' }}>
          <span>Protegido con cifrado de extremo a extremo</span>
          <a href="#" style={{ color: 'var(--text-3)' }} onMouseEnter={(e)=>e.currentTarget.style.color='var(--text)'} onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-3)'}>¿Necesitas ayuda?</a>
        </div>
      </div>
    </div>
  );
}

function TabBtn({ active, onClick, children }) {
  return (
    <button onClick={onClick} type="button" style={{
      padding: '7px 14px', borderRadius: 8,
      background: active ? 'linear-gradient(180deg, rgba(59,130,246,0.18), rgba(59,130,246,0.10))' : 'transparent',
      border: active ? '1px solid rgba(59,130,246,0.45)' : '1px solid transparent',
      color: active ? '#fff' : 'var(--text-3)',
      fontSize: 13, fontWeight: 500, cursor: 'pointer',
      boxShadow: active ? '0 0 14px rgba(59,130,246,0.25), inset 0 1px 0 rgba(255,255,255,0.08)' : 'none',
      transition: 'all 160ms',
    }}
      onMouseEnter={(e)=>{ if(!active) e.currentTarget.style.color='var(--text)'; }}
      onMouseLeave={(e)=>{ if(!active) e.currentTarget.style.color='var(--text-3)'; }}
    >
      {children}
    </button>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
