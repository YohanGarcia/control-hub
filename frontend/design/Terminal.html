const Sparkline = ({ data, color = 'var(--blue)', width = 110, height = 26, glow = true }) => {
  const max = Math.max(...data, 1);
  const min = Math.min(...data, 0);
  const range = max - min || 1;
  const stepX = width / (data.length - 1);
  const points = data.map((v, i) => {
    const x = i * stepX;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return [x, y];
  });
  const pathD = points.map((p, i) => (i === 0 ? `M ${p[0]} ${p[1]}` : `L ${p[0]} ${p[1]}`)).join(' ');
  const areaD = pathD + ` L ${width} ${height} L 0 ${height} Z`;
  const id = useMemo(() => 'spk_' + Math.random().toString(36).slice(2, 8), []);
  return (
    <svg width={width} height={height} style={{ display: 'block' }}>
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor={color} stopOpacity="0.35"/>
          <stop offset="1" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={areaD} fill={`url(#${id})`} />
      <path d={pathD} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={glow ? { filter: `drop-shadow(0 0 4px ${color})` } : {}} />
    </svg>
  );
};

function syntaxizeCmd(cmd) {
  // very lightweight: first token green-ish, flags amber, strings violet
  const parts = [];
  let i = 0;
  const tokens = cmd.match(/("[^"]*"|'[^']*'|--?[\w-]+|[^\s]+)/g) || [];
  tokens.forEach((tok, idx) => {
    let c = 'var(--text)';
    if (idx === 0) c = 'var(--green-2)';
    else if (tok.startsWith('-')) c = 'var(--amber)';
    else if (/^["']/.test(tok)) c = 'var(--violet-2)';
    else if (/^\d/.test(tok)) c = 'var(--cyan)';
    parts.push(<span key={idx} style={{ color: c }}>{tok}</span>);
    if (idx < tokens.length - 1) parts.push(<span key={'s'+idx}> </span>);
  });
  return parts;
}

function LogLine({ line, animate }) {
  const cls = animate ? 'line-in' : '';
  if (line.k === 'sys') {
    return <div className={'mono ' + cls} style={{ color: 'var(--text-3)', padding: '1px 0' }}>{line.t}</div>;
  }
  if (line.k === 'out') {

    if (line.cls === 'g') color = 'var(--green-2)';
    if (line.cls === 'dim') color = 'var(--text-3)';

    return <div className={'mono ' + cls} style={{ color, padding: '1px 0', whiteSpace: 'pre-wrap' }}>{line.t}</div>;
  }
  if (line.k === 'prompt') {
    return (
      <div className={'mono ' + cls} style={{ display:'flex', flexWrap:'wrap', alignItems:'baseline', padding: '4px 0', gap: 0 }}>
        <span style={{ color: 'var(--green-2)' }}>{line.host}</span>
        <span style={{ color: 'var(--text-3)' }}>:</span>

  }
  if (line.k === 'log') {
    const s = sevStyle[line.sev] || sevStyle.info;
    return (
      <div className={'mono ' + cls} style={{ display:'flex', alignItems:'flex-start', gap: 10, padding: '2px 0', fontSize: 12.5 }}>

        <span style={{ color: 'var(--text)', whiteSpace:'pre-wrap' }}>{line.t}</span>
      </div>
    );
  }
  return null;
}

const HELP_LINES = [
  { k: 'out', cls: 'g', t: 'Comandos disponibles:' },
  { k: 'out', t: '  help                 muestra esta ayuda' },
  { k: 'out', t: '  clear                limpia la terminal' },
  { k: 'out', t: '  status               estado del servidor activo' },
  { k: 'out', t: '  ps                   procesos en ejecución' },
  { k: 'out', t: '  ls [path]            lista archivos' },
  { k: 'out', t: '  uptime               tiempo activo del sistema' },
  { k: 'out', t: '  docker ps            contenedores en ejecución' },
  { k: 'out', t: '  tail -f <file>       streaming de logs (Ctrl+C para detener)' },
];

function Terminal({ server, paused, setPaused, follow, setFollow, splitView }) {
  const [lines, setLines] = useState(INITIAL_LINES);
  const [input, setInput] = useState('');
  const [history, setHistory] = useState([]);
  const [histIdx, setHistIdx] = useState(-1);
  const [hovered, setHovered] = useState(false);
  const scrollRef = useRef(null);
  const inputRef = useRef(null);

  // streaming logs
  useEffect(() => {
    if (paused) return;
    let i = 0;
    const id = setInterval(() => {
      const tpl = STREAM_TEMPLATES[Math.floor(Math.random() * STREAM_TEMPLATES.length)];
      const now = new Date();
      const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
      const text = tpl.t
        .replace('%MIN%', String(now.getMinutes()).padStart(2,'0'))
        .replace('%SEC%', String(now.getSeconds()).padStart(2,'0'))
        .replace(/%RID%/g, () => Math.random().toString(36).slice(2, 7));
      setLines(prev => {
        const next = [...prev, { ...tpl, t: text, time, _id: Date.now() + i }];
        if (next.length > 400) next.splice(0, next.length - 400);
        return next;
      });
      i++;
    }, 1100);
    return () => clearInterval(id);
  }, [paused]);

  // auto-scroll
  useEffect(() => {
    if (!follow) return;
    if (!scrollRef.current) return;
    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [lines, follow]);

  // detect manual scroll up to pause follow
  const onScroll = () => {
    const el = scrollRef.current;
    if (!el) return;
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 30;
    if (!atBottom && follow) setFollow(false);
  };

  const runCommand = (raw) => {
    const cmd = raw.trim();
    if (!cmd) {
      setLines(prev => [...prev, { k: 'prompt', host: server.host, path: '~', cmd: '' }]);
      return;
    }
    setHistory(h => [...h, cmd]);
    setHistIdx(-1);
    const promptLine = { k: 'prompt', host: server.host, path: '~', cmd };
    const out = [];
    const first = cmd.split(/\s+/)[0];
    if (first === 'clear') {
      setLines([]);
      return;
    }
    if (first === 'help') out.push(...HELP_LINES);
    else if (first === 'status') {
      out.push({ k: 'out', cls: 'g', t: `● ${server.name} — ${statusMap[server.status].label}` });
      out.push({ k: 'out', t: `  Host: ${server.host}   IP: ${server.ip}   OS: ${server.os}` });
      out.push({ k: 'out', t: `  Región: ${server.region}   Latencia: ${server.latency}ms   Uptime: ${server.uptime}` });
    } else if (first === 'ps') {
      out.push({ k: 'out', cls: 'dim', t: 'PID   USER       %CPU  %MEM  COMMAND' });
      out.push({ k: 'out', t: '1432  root        2.1   0.8   nginx: master' });
      out.push({ k: 'out', t: '1433  www-data    1.8   0.6   nginx: worker' });
      out.push({ k: 'out', t: '2104  postgres    5.4   3.1   postgres -D /var/lib/pg' });
      out.push({ k: 'out', t: '4421  app         8.2   4.6   node /srv/api/dist/index.js' });
      out.push({ k: 'out', t: '5012  redis       0.3   0.4   redis-server *:6379' });
    } else if (first === 'ls') {
      out.push({ k: 'out', cls: 'v', t: 'apps/   data/   logs/   secrets/   .env   docker-compose.yml' });
    } else if (first === 'uptime') {
      out.push({ k: 'out', t: ` 11:42:08 up ${server.uptime},  3 users,  load average: 0.89, 0.74, 0.61` });
    } else if (first === 'docker') {
      out.push({ k: 'out', cls: 'dim', t: 'NAMES                STATUS              PORTS' });
      out.push({ k: 'out', t: 'api-gateway          Up 2 hours          0.0.0.0:8080->8080/tcp' });
      out.push({ k: 'out', t: 'postgres-primary     Up 2 hours          0.0.0.0:5432->5432/tcp' });
      out.push({ k: 'out', t: 'redis-cache          Up 2 hours          6379/tcp' });
    } else if (first === 'tail') {
      out.push({ k: 'out', cls: 'dim', t: '── streaming activo · usa el botón ⏸ para pausar ──' });
    } else if (first === 'exit') {
      out.push({ k: 'sys', t: '── sesión cerrada (simulación) ──' });
    } else {
      out.push({ k: 'out', cls: 'dim', t: `command not found: ${first}` });
    }

    setLines(prev => [...prev, promptLine, ...out]);
    setFollow(true);
  };

  const onKey = (e) => {
    if (e.key === 'Enter') {
      runCommand(input);
      setInput('');
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (history.length === 0) return;
      const ni = histIdx === -1 ? history.length - 1 : Math.max(0, histIdx - 1);
      setHistIdx(ni);
      setInput(history[ni]);
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (histIdx === -1) return;
      const ni = histIdx + 1;
      if (ni >= history.length) { setHistIdx(-1); setInput(''); }
      else { setHistIdx(ni); setInput(history[ni]); }
    } else if (e.key === 'l' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault(); setLines([]);
    }
  };

  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      background: 'rgba(7,10,20,0.85)',
      position: 'relative',
      minHeight: 0,

            <Icon name="branch" size={12} style={{color:'var(--violet-2)'}}/> main
            <span style={{ color: 'var(--green-2)', marginLeft: 4 }}>● clean</span>
          </span>
          <span style={{ color: 'var(--text-4)' }}>·</span>
          <span className="mono" style={{ color: 'var(--text-3)' }}>{lines.filter(l=>l.k==='log').length} eventos</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap: 6 }}>
          <ToolBtn icon={paused ? 'play' : 'pause'} label={paused ? 'Reanudar' : 'Pausar'} onClick={() => setPaused(p => !p)} active={paused}/>

      {/* log area */}
      <div ref={scrollRef} onScroll={onScroll} className="scroll" style={{

      {/* command input */}
      <div style={{

/* Larger metric chart */
function LineChartLarge({ data, color, height = 170 }) {
  const id = useMemo(() => 'lcl_' + Math.random().toString(36).slice(2, 8), []);
  const width = 100; // viewBox units, will stretch
  const max = Math.max(...data, 100);
  const min = 0;
  const padY = 8;
  const innerH = height - padY * 2;
  const stepX = width / (data.length - 1);
  const points = data.map((v, i) => {
    const x = i * stepX;
    const y = padY + (1 - (v - min) / (max - min)) * innerH;
    return [x, y];
  });
  const path = points.map((p,i) => (i===0 ? `M ${p[0]} ${p[1]}` : `L ${p[0]} ${p[1]}`)).join(' ');
  const area = path + ` L ${width} ${height} L 0 ${height} Z`;
  const last = points[points.length - 1];
  return (
    <svg viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{ width: '100%', height, display: 'block' }}>
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor={color} stopOpacity="0.40"/>
          <stop offset="1" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {/* gridlines */}
      {[0, 0.5, 1].map((p, i) => (
        <line key={i} x1="0" x2={width} y1={padY + p*innerH} y2={padY + p*innerH} stroke="rgba(255,255,255,0.05)" strokeWidth="0.3"/>
      ))}
      <path d={area} fill={`url(#${id})`} />
      <path d={path} fill="none" stroke={color} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" style={{ filter: `drop-shadow(0 0 4px ${color})` }}/>
      {/* end dot */}
      <circle cx={last[0]} cy={last[1]} r="2.4" fill={color} style={{ filter: `drop-shadow(0 0 6px ${color})` }} vectorEffect="non-scaling-stroke"/>
      <circle cx={last[0]} cy={last[1]} r="1" fill="#fff" vectorEffect="non-scaling-stroke"/>
    </svg>
  );
}

function MiniConsole({ server }) {
  const [collapsed, setCollapsed] = useState(false);
  const [input, setInput] = useState('');
  const [lines, setLines] = useState([
    { k: 'out', t: `Bienvenido a ${server.name} (${server.os})` },
    { k: 'out', t: "Escribe 'help' para ver los comandos disponibles" },
    { k: 'prompt', host: server.host, path: '~', cmd: 'ls -lah' },
    { k: 'out', t: 'total 48K' },
    { k: 'out', t: 'drwx------    5 root root 4.0K may 20 10:15 .' },
    { k: 'out', t: 'drwxr-xr-x   18 root root 4.0K may 18 09:02 ..' },
    { k: 'out', t: '-rw-------    1 root root 3.2K may 20 10:15 .bash_history' },
    { k: 'out', t: '-rw-r--r--    1 root root  220 may 18 09:02 .bash_logout' },
    { k: 'out', t: '-rw-r--r--    1 root root 3.7K may 18 09:02 .bashrc' },
    { k: 'out', t: 'drwx------    2 root root 4.0K may 19 09:10 .cache' },
  ]);

  const runCmd = (raw) => {
    const cmd = raw.trim();
    if (!cmd) return;
    setLines(p => [...p, { k: 'prompt', host: server.host, path: '~', cmd }, { k: 'out', cls: 'dim', t: `→ '${cmd}' enviado al servidor` }]);
  };

  return (
    <div style={{
      background: 'rgba(15,20,36,0.6)',
      border: '1px solid var(--line)',
      borderRadius: 14,
      overflow: 'hidden',
    }}>
      <div style={{
        display:'flex', alignItems:'center', justifyContent:'space-between',
        padding: '12px 16px',
        borderBottom: collapsed ? 'none' : '1px solid var(--line)',
      }}>
        <div style={{ display:'flex', alignItems:'center', gap: 10 }}>
          <div style={{ width: 28, height: 28, borderRadius: 7, background: 'rgba(255,255,255,0.04)', border: '1px solid var(--line)', color: 'var(--blue-2)', display:'grid', placeItems:'center' }}>
            <Icon name="terminal" size={14}/>
          </div>
          <span style={{ fontSize: 14, fontWeight: 600, color: '#fff' }}>Consola</span>
          <StatusDot status="online"/>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap: 6 }}>
          <ToolBtn icon="trash" label="Limpiar" onClick={() => setLines([])}/>
          <a href="Terminal.html" title="Abrir en pantalla completa" style={{
            display:'inline-flex', alignItems:'center', justifyContent: 'center',
            padding: '6px 9px', borderRadius: 7,
            background: 'rgba(255,255,255,0.02)', border: '1px solid var(--line)',
            color: 'var(--text-2)', textDecoration: 'none',
          }}><Icon name="expand" size={13}/></a>
          <ToolBtn icon={collapsed ? 'chevron-right' : 'chevron-down'} label={collapsed ? 'Expandir' : 'Contraer'} onClick={() => setCollapsed(c => !c)}/>
        </div>
      </div>
      {!collapsed && (
        <>
          <div className="scroll" style={{ maxHeight: 240, overflowY: 'auto', padding: '12px 16px', fontSize: 12.5, lineHeight: 1.55 }}>
            {lines.map((l, i) => <LogLine key={i} line={l}/>)}
            <div className="mono" style={{ display:'flex', alignItems:'baseline' }}>
              <span style={{ color:'var(--green-2)' }}>{server.host}</span>
              <span style={{ color:'var(--text-3)' }}>:</span>
              <span style={{ color:'var(--blue-2)' }}>~</span>
              <span style={{ color:'var(--text-3)', marginRight: 8 }}>#</span>
              <span className="caret"/>
            </div>
          </div>
          <div style={{ borderTop: '1px solid var(--line)', display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px' }}>
            <input
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => { if (e.key === 'Enter') { runCmd(input); setInput(''); }}}
              placeholder="Escribe un comando…"
              className="mono"
              spellCheck="false"
              style={{
                flex: 1, background: 'transparent', border: 0, outline: 'none',
                color: '#fff', fontSize: 13, padding: '6px 8px',
              }}
            />
            <button onClick={() => { runCmd(input); setInput(''); }} style={{
              display:'inline-flex', alignItems:'center', gap: 6,
              padding: '7px 12px', borderRadius: 8,
              background: 'linear-gradient(180deg, #3b82f6, #2f6ed1)',
              color: '#fff', border: 0, fontWeight: 600, fontSize: 12.5, cursor: 'pointer',
              boxShadow: '0 6px 18px rgba(59,130,246,0.35), inset 0 1px 0 rgba(255,255,255,0.18)',
              fontFamily: 'inherit',
            }}><Icon name="play" size={12}/> Ejecutar</button>
          </div>
        </>
      )}
    </div>
  );
}

function SmallMetric({ icon, label, value, delta, color, data }) {
  const isUp = delta && (delta.startsWith('+'));
  return (
    <div style={{
      padding: 14, borderRadius: 12,
      background: 'rgba(15,20,36,0.6)',
      border: '1px solid var(--line)',
      display: 'flex', flexDirection: 'column', gap: 10,
    }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems:'center', gap: 10 }}>
          <div style={{ width: 28, height: 28, borderRadius: 7, background: 'rgba(255,255,255,0.04)', border: '1px solid var(--line)', color, display:'grid', placeItems:'center' }}>
            <Icon name={icon} size={14}/>
          </div>
          <span style={{ fontSize: 12, color: 'var(--text-3)' }}>{label}</span>
        </div>
        <span style={{ fontSize: 11, color: isUp ? 'var(--green-2)' : delta?.startsWith('−') ? 'var(--red)' : 'var(--text-3)', fontWeight: 600 }}>{delta}</span>
      </div>
      <div style={{ display:'flex', alignItems: 'flex-end', justifyContent:'space-between' }}>
        <span className="mono" style={{ fontSize: 22, fontWeight: 700, color: '#fff', letterSpacing: -0.5 }}>{value}</span>
        <Sparkline data={data} color={color} width={90} height={28}/>
      </div>
    </div>
  );
}

function LegendDot({ c, children }) {
  return <span style={{ display:'inline-flex', alignItems:'center', gap: 6 }}>
    <span style={{ width: 8, height: 8, borderRadius: 2, background: c, boxShadow: `0 0 6px ${c}` }}/>{children}
  </span>;
}

function MultiSeriesChart({ series, height = 180 }) {
  const width = 100;
  const padY = 10;
  const innerH = height - padY * 2;
  const max = Math.max(...series.flatMap(s => s.data), 100);
  return (
    <svg viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{ width: '100%', height, display: 'block' }}>
      {[0, 0.25, 0.5, 0.75, 1].map((p, i) => (
        <line key={i} x1="0" x2={width} y1={padY + p*innerH} y2={padY + p*innerH} stroke="rgba(255,255,255,0.05)" strokeWidth="0.3"/>
      ))}
      {series.map((s, si) => {
        const stepX = width / (s.data.length - 1);
        const points = s.data.map((v, i) => [i * stepX, padY + (1 - v/max) * innerH]);
        const path = points.map((p,i) => (i===0 ? `M ${p[0]} ${p[1]}` : `L ${p[0]} ${p[1]}`)).join(' ');
        const area = path + ` L ${width} ${height} L 0 ${height} Z`;
        const id = `mss_${si}_${Math.random().toString(36).slice(2,6)}`;
        const last = points[points.length - 1];
        return (
          <g key={si}>

        );
      })}
    </svg>
  );

function RegistrosTab({ server }) {
  const [lines, setLines] = useState(() => Array.from({length: 18}, (_, i) => fakeLog(i)));
  const [paused, setPaused] = useState(false);
  const [sev, setSev] = useState('Todos');
  const scrollRef = useRef(null);
  useEffect(() => {
    if (paused) return;
    const id = setInterval(() => {
      setLines(prev => {
        const next = [...prev, fakeLog(prev.length)];
        if (next.length > 200) next.splice(0, next.length - 200);
        return next;
      });
    }, 900);
    return () => clearInterval(id);
  }, [paused]);
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [lines]);
  const filtered = lines.filter(l => sev === 'Todos' || (sev === 'Info' ? l.sev === 'info' : sev === 'Warn' ? l.sev === 'warn' : sev === 'Error' ? l.sev === 'err' : l.sev === 'ok'));
  return (
    <>
      <div style={{ display: 'flex', gap: 16 }}>
        <SmallStat label="Eventos · 1h" value={`${lines.length}`}     icon="chart" color="var(--blue-2)"/>
        <SmallStat label="Info"          value={lines.filter(l=>l.sev==='info').length}  icon="check" color="var(--blue-2)"/>
        <SmallStat label="Advertencias"  value={lines.filter(l=>l.sev==='warn').length}  icon="warn"  color="var(--amber)"/>
        <SmallStat label="Errores"       value={lines.filter(l=>l.sev==='err').length}   icon="warn"  color="var(--red)"/>
      </div>

        <div style={{ display:'flex', gap: 8, alignItems:'center' }}>
          <SegSelect value={sev} setValue={setSev} options={['Todos','Info','OK','Warn','Error']}/>
          <button onClick={()=>setPaused(p=>!p)} style={{
            display:'inline-flex', alignItems:'center', gap: 6, padding: '6px 10px', borderRadius: 8,
            background: paused ? 'rgba(139,92,246,0.15)' : 'rgba(255,255,255,0.025)',
            border: '1px solid var(--line)',
            color: paused ? 'var(--violet-2)' : 'var(--text-2)', fontSize: 12, cursor: 'pointer', fontFamily: 'inherit',
          }}><Icon name={paused?'play':'pause'} size={12}/> {paused?'Reanudar':'Pausar'}</button>
        </div>
      }>
        <div ref={scrollRef} className="scroll" style={{ height: 460, overflowY: 'auto', padding: '12px 18px', fontSize: 12.5 }}>
          {filtered.map((l, i) => <LogLine key={l._id || i} line={l} animate={i > filtered.length - 3}/>)}
        </div>
      </Panel>
    </>
  );
}
function fakeLog(i) {
  const tpl = STREAM_TEMPLATES[Math.floor(Math.random() * STREAM_TEMPLATES.length)];
  const now = new Date(Date.now() - (1000 * (50 - i)));
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const text = tpl.t
    .replace('%MIN%', String(now.getMinutes()).padStart(2,'0'))
    .replace('%SEC%', String(now.getSeconds()).padStart(2,'0'))
    .replace(/%RID%/g, () => Math.random().toString(36).slice(2, 7));
  return { ...tpl, t: text, time, _id: Date.now() + i + Math.random() };
}

        <SmallStat label="Activas"      value={ALERTS.filter(a => !a.acked).length} icon="bell" color="var(--amber)"/>
        <SmallStat label="Críticas"     value={ALERTS.filter(a => a.sev==='err' && !a.acked).length} icon="warn" color="var(--red)"/>
        <SmallStat label="Reconocidas"  value={ALERTS.filter(a => a.acked).length} icon="check" color="var(--green-2)"/>
        <SmallStat label="Reglas"       value={24} icon="shield"/>
      </div>
      <Panel padless action={<SegSelect value={tab} setValue={setTab} options={['Activas', 'Reconocidas']}/>}
        title={`${list.length} ${tab.toLowerCase()}`}>
        <div style={{ display: 'flex', flexDirection: 'column' }}>
          {list.map((a, i) => {
            const m = meta[a.sev];
            return (
              <div key={a.id} style={{
                display: 'grid', gridTemplateColumns: '40px 1fr auto',
                gap: 14, alignItems: 'center', padding: '14px 18px',
                borderTop: i === 0 ? 'none' : '1px solid var(--line)',
              }}>
                <div style={{ width: 36, height: 36, borderRadius: 9, border: `1px solid ${m.b}`, background: m.bg, color: m.c, display:'grid', placeItems:'center' }}>
                  <Icon name={a.sev === 'err' ? 'warn' : a.sev === 'ok' ? 'check' : a.sev === 'info' ? 'bell' : 'warn'} size={16}/>
                </div>
                <div>
                  <div style={{ display:'flex', alignItems:'center', gap: 10, marginBottom: 2 }}>
                    <span style={{ fontSize: 13.5, fontWeight: 600, color:'#fff' }}>{a.title}</span>
                    <Pill color={m.c} bg={m.bg} border={m.b}>{m.l}</Pill>
                    <span style={{ fontSize: 11, color: 'var(--text-3)' }}>· {a.src}</span>
                    <span style={{ fontSize: 11, color: 'var(--text-4)' }}>· {a.time}</span>
                  </div>
                  <div style={{ fontSize: 12.5, color: 'var(--text-3)', lineHeight: 1.45 }}>{a.desc}</div>
                </div>
                <div style={{ display:'flex', gap: 6 }}>
                  {!a.acked && <button style={{
                    padding: '6px 12px', borderRadius: 7, border: '1px solid var(--line)',
                    background: 'rgba(255,255,255,0.025)', color: 'var(--text)', fontSize: 12, cursor:'pointer', fontFamily:'inherit',
                  }}>Reconocer</button>}
                  <RowBtn icon="more" title="Más"/>
                </div>
              </div>
            );
          })}
        </div>
      </Panel>
    </>
  );
}

/* =========================================================
   CONFIGURACIÓN TAB
   ========================================================= */
function ConfiguracionTab({ server }) {
  const [vals, setVals] = useState({
    hostname: server.name.toLowerCase(),
    autoRestart: true,
    notif: 'Sólo críticas',
    interval: '15s',
    timezone: 'America/Mexico_City',
    sshKeyOnly: true,
    fa2: true,
    autoUpdates: false,
  });
  const set = (k, v) => setVals(s => ({...s, [k]: v}));
  return (
    <>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        <Panel title="General">
          <SettingField label="Nombre de host" hint="Identificador único del dispositivo">
            <TextInput value={vals.hostname} onChange={(v)=>set('hostname', v)}/>
          </SettingField>
          <SettingField label="Zona horaria" hint="Usada en eventos y registros">
            <DropdownInput value={vals.timezone} options={['America/Mexico_City','America/New_York','Europe/Madrid','UTC']} onChange={(v)=>set('timezone', v)}/>
          </SettingField>
          <SettingField label="Reinicio automático" hint="Reinicia si el dispositivo no responde">
            <Toggle value={vals.autoRestart} onChange={(v)=>set('autoRestart', v)}/>
          </SettingField>
        </Panel>

        <Panel title="Monitoreo">
          <SettingField label="Intervalo de polling" hint="Cada cuanto se consultan métricas">
            <DropdownInput value={vals.interval} options={['5s','15s','30s','1m','5m']} onChange={(v)=>set('interval', v)}/>
          </SettingField>
          <SettingField label="Notificaciones" hint="Qué eventos llegan a tu correo">
            <DropdownInput value={vals.notif} options={['Todas','Sólo críticas','Personalizado','Ninguna']} onChange={(v)=>set('notif', v)}/>
          </SettingField>
          <SettingField label="Umbrales de alerta">
            <div style={{ display:'flex', gap: 12 }}>
              <ThresholdPill label="CPU" v="85%"/>
              <ThresholdPill label="RAM" v="80%"/>
              <ThresholdPill label="Disco" v="90%"/>
            </div>
          </SettingField>
        </Panel>

        <Panel title="Seguridad">
          <SettingField label="Acceso sólo con clave SSH" hint="Bloquea autenticación por contraseña">
            <Toggle value={vals.sshKeyOnly} onChange={(v)=>set('sshKeyOnly', v)}/>
          </SettingField>
          <SettingField label="Doble factor (2FA)" hint="Requerido para acciones críticas">
            <Toggle value={vals.fa2} onChange={(v)=>set('fa2', v)}/>
          </SettingField>
          <SettingField label="Actualizaciones automáticas" hint="Aplicar parches de seguridad sin confirmación">
            <Toggle value={vals.autoUpdates} onChange={(v)=>set('autoUpdates', v)}/>
          </SettingField>
        </Panel>

        <Panel title="Conexión SSH">
          <SettingField label="Host">
            <span className="mono" style={{ color:'#fff' }}>{server.host}@{server.ip}:22</span>
          </SettingField>
          <SettingField label="Cifrado">
            <span className="mono" style={{ color:'var(--green-2)' }}>ED25519 · AES-256-GCM</span>
          </SettingField>
          <SettingField label="Claves autorizadas">
            <div style={{ display:'flex', flexDirection: 'column', gap: 8 }}>
              {['admin@mac-pro · ed25519 · 2 días', 'ci-runner · ed25519 · hace 3 sem', 'backup-job · rsa · expira en 12 días'].map(k => (
                <div key={k} className="mono" style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding: '8px 10px', background:'rgba(255,255,255,0.025)', border: '1px solid var(--line)', borderRadius: 8, fontSize: 12 }}>
                  <span style={{ color:'var(--text-2)' }}><Icon name="lock" size={12} style={{display:'inline-block', verticalAlign:-2, marginRight:6}}/> {k}</span>
                  <RowBtn icon="trash" title="Revocar" tone="danger"/>
                </div>
              ))}
            </div>
          </SettingField>
        </Panel>
      </div>

      <div style={{ display:'flex', justifyContent: 'flex-end', gap: 8 }}>
        <button style={{ padding: '9px 16px', borderRadius: 10, background: 'rgba(255,255,255,0.025)', border: '1px solid var(--line)', color: 'var(--text)', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>Cancelar</button>
        <button style={{ padding: '9px 16px', borderRadius: 10, background: 'linear-gradient(180deg, #3b82f6, #2f6ed1)', border: 0, color: '#fff', fontSize: 13, fontWeight: 600, cursor: 'pointer', boxShadow: '0 6px 18px rgba(59,130,246,0.32), inset 0 1px 0 rgba(255,255,255,0.18)', fontFamily: 'inherit' }}>Guardar cambios</button>
      </div>
    </>
  );
}
function SettingField({ label, hint, children }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 16, alignItems: 'center', padding: '12px 0', borderBottom: '1px solid var(--line)' }}>
      <div>
        <div style={{ fontSize: 13, color: '#fff', fontWeight: 500 }}>{label}</div>
        {hint && <div style={{ fontSize: 11.5, color: 'var(--text-3)', marginTop: 2 }}>{hint}</div>}
      </div>
      <div>{children}</div>
    </div>
  );
}
function TextInput({ value, onChange }) {
  return <input value={value} onChange={(e)=>onChange(e.target.value)} style={{
    padding: '7px 10px', minWidth: 220,
    background: 'rgba(255,255,255,0.025)', border: '1px solid var(--line)', borderRadius: 8,
    color: '#fff', fontFamily: 'inherit', fontSize: 12.5, outline: 'none',
  }}/>;
}
function DropdownInput({ value, options, onChange }) {
  return (
    <select value={value} onChange={(e)=>onChange(e.target.value)} style={{
      padding: '7px 28px 7px 10px', minWidth: 200,
      background: 'rgba(255,255,255,0.025)', border: '1px solid var(--line)', borderRadius: 8,
      color: '#fff', fontFamily: 'inherit', fontSize: 12.5, outline: 'none', appearance: 'none',
      backgroundImage: 'linear-gradient(45deg, transparent 50%, var(--text-3) 50%), linear-gradient(135deg, var(--text-3) 50%, transparent 50%)',
      backgroundPosition: 'calc(100% - 14px) center, calc(100% - 9px) center',
      backgroundSize: '5px 5px, 5px 5px',
      backgroundRepeat: 'no-repeat',
    }}>
      {options.map(o => <option key={o} value={o} style={{background:'#0f1424'}}>{o}</option>)}
    </select>
  );
}
function Toggle({ value, onChange }) {
  return (
    <button onClick={()=>onChange(!value)} style={{
      width: 42, height: 24, borderRadius: 999, position: 'relative', cursor: 'pointer',
      background: value ? 'linear-gradient(180deg, #3b82f6, #2f6ed1)' : 'rgba(255,255,255,0.06)',
      border: '1px solid ' + (value ? 'rgba(59,130,246,0.5)' : 'var(--line)'),
      boxShadow: value ? '0 0 10px rgba(59,130,246,0.4), inset 0 1px 0 rgba(255,255,255,0.18)' : 'none',
      transition: 'all 180ms ease', padding: 0,
    }}>
      <span style={{
        position: 'absolute', top: 2, left: value ? 20 : 2,
        width: 18, height: 18, borderRadius: '50%', background: '#fff',
        transition: 'left 180ms cubic-bezier(.4,.2,.2,1)',
        boxShadow: '0 1px 4px rgba(0,0,0,0.4)',
      }}/>
    </button>
  );
}
function ThresholdPill({ label, v }) {
  return <div style={{
    padding: '6px 12px', borderRadius: 8,
    background: 'rgba(255,255,255,0.025)', border: '1px solid var(--line)',
    fontSize: 12, color: 'var(--text-2)',
  }}><span style={{ color:'var(--text-3)', marginRight: 6 }}>{label}</span><span className="mono" style={{color:'#fff'}}>{v}</span></div>;
}

/* =========================================================
   APP
   ========================================================= */
function App() {
  const [view, setView] = useState('devices');
  const [activeServerId, setActiveServerId] = useState('srv-01');
  const [railExpanded, setRailExpanded] = useState(false);
  const [query, setQuery] = useState('');
  const [tabs, setTabs] = useState([
    { id: 't1', label: 'root@srv-01: ~', status: 'online', serverId: 'srv-01' },
    { id: 't2', label: 'postgres@db-prod: ~', status: 'online', serverId: 'db-prod' },
    { id: 't3', label: 'deploy@web-prod: /var/log', status: 'online', serverId: 'web-prod' },
    { id: 't4', label: 'root@srv-03: ~', status: 'warning', serverId: 'srv-03' },
  ]);
  const [activeTab, setActiveTab] = useState('t1');
  const [rightOpen, setRightOpen] = useState(true);
  const [paused, setPaused] = useState(false);
  const [follow, setFollow] = useState(true);

  const server = SERVERS.find(s => s.id === activeServerId) || SERVERS[0];

  const addTab = () => {
    const id = 't' + Math.random().toString(36).slice(2, 6);
    setTabs(t => [...t, { id, label: `${server.host}: ~`, status: server.status, serverId: server.id }]);
    setActiveTab(id);
  };
  const closeTab = (id) => {
    setTabs(t => {
      const next = t.filter(x => x.id !== id);
      if (id === activeTab && next.length) setActiveTab(next[0].id);
      return next;
    });
  };

  // live metrics
  const [metrics, setMetrics] = useState({
    cpu: 32, ram: 68, disk: 42, net: 2.1, lat: 12,
    spark: {
      cpu: Array.from({length: 30}, () => 25 + Math.random()*20),
      ram: Array.from({length: 30}, () => 60 + Math.random()*15),
      disk: Array.from({length: 30}, () => 38 + Math.random()*8),
      net: Array.from({length: 30}, () => 1 + Math.random()*3),
      lat: Array.from({length: 30}, () => 10 + Math.random()*10),
    }
  });

  useEffect(() => {
    const id = setInterval(() => {
      setMetrics(m => {
        const next = { ...m };
        const upd = (key, base, vari, min=0, max=100) => {
          const last = next.spark[key][next.spark[key].length-1];
          const v = Math.max(min, Math.min(max, last + (Math.random()-0.5)*vari));
          next.spark = { ...next.spark, [key]: [...next.spark[key].slice(1), v] };
          return v;
        };
        next.cpu  = upd('cpu', 32, 8, 5, 95);
        next.ram  = upd('ram', 68, 4, 30, 92);
        next.disk = upd('disk', 42, 1.5, 30, 80);
        next.net  = upd('net', 2.1, 0.6, 0.2, 8);
        next.lat  = upd('lat', 12, 3, 5, 60);
        return next;
      });
    }, 1200);
    return () => clearInterval(id);
  }, []);

  return (
    <div style={{ display: 'flex', height: '100vh', width: '100vw', minHeight: 0 }}>
      <IconRail active={view} onNavigate={setView} expanded={railExpanded} setExpanded={setRailExpanded}/>
      <ServerList servers={SERVERS} activeId={activeServerId} onSelect={setActiveServerId} query={query} setQuery={setQuery}/>
      {view === 'terminal' ? (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
          <TopBar
            server={server}
            tabs={tabs}
            activeTab={activeTab}
            setActiveTab={setActiveTab}
            addTab={addTab}
            closeTab={closeTab}
            metrics={metrics}
            rightOpen={rightOpen}
            setRightOpen={setRightOpen}
          />
          <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
            <Terminal
              server={server}
              paused={paused}
              setPaused={setPaused}
              follow={follow}
              setFollow={setFollow}
            />
            {rightOpen && <RightPanel server={server} metrics={metrics}/>}
          </div>
        </div>
      ) : (
        <DevicesView server={server} metrics={metrics}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
